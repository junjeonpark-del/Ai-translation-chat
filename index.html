<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>国际学生固定咨询室</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-left">
        <div class="logo">🌐</div>
        <div>
          <h1>International Student Support Room</h1>
          <p>国际学生固定咨询室 · 외국인 유학생 고정 상담실</p>
        </div>
      </div>
      <div class="topbar-right">
        <span class="status-dot"></span>
        <span id="roomStatusText">咨询室开放中</span>
      </div>
    </header>

    <main class="main-layout">
      <aside class="sidebar">
        <section class="panel">
          <div class="panel">
  <h2>创建房间</h2>
  <label class="form-label">房间名称</label>
  <input id="roomNameInput" class="form-control" type="text" placeholder="例如：AI专业助教咨询室" />

  <label class="form-label">房间分类</label>
  <input id="roomCategoryInput" class="form-control" type="text" placeholder="例如：AI / 综合 / 酒店航空" />

  <button id="createRoomBtn" class="primary-btn">创建房间</button>
</div>

<div class="panel">
  <h2>房间列表</h2>
  <div id="roomList"></div>
</div>
          <h2>进入咨询室</h2>

          <label class="form-label">身份</label>
          <select id="roleSelect" class="form-control">
            <option value="student">学生 Student</option>
            <option value="staff">老师 Staff</option>
          </select>

          <label class="form-label">姓名 / 昵称</label>
          <input id="nameInput" class="form-control" type="text" placeholder="请输入姓名或昵称" />

          <label class="form-label">接收语言</label>
          <select id="targetLanguage" class="form-control">
            <option value="zh">中文</option>
            <option value="ko">한국어</option>
            <option value="en">English</option>
            <option value="uz">Oʻzbekcha</option>
            <option value="mn">Монгол</option>
          </select>

          <button id="enterRoomBtn" class="primary-btn">进入咨询室</button>

          <div class="current-user-box">
            <h3>当前身份</h3>
            <p><strong>身份：</strong><span id="currentRole">未进入</span></p>
            <p><strong>姓名：</strong><span id="currentName">未进入</span></p>
            <p><strong>发送语言：</strong><span id="currentSourceLang">-</span></p>
            <p><strong>接收语言：</strong><span id="currentTargetLang">-</span></p>
          </div>
        </section>

        <section class="panel">
          <h2>当前在线老师</h2>
          <div id="onlineStaffList" class="staff-list"></div>
        </section>

        <section class="panel">
          <h2>快捷问题</h2>
          <div class="quick-buttons">
            <button class="quick-btn" data-text="我想咨询签证延期材料。">签证</button>
            <button class="quick-btn" data-text="我想查询学费与奖学金。">学费奖学金</button>
            <button class="quick-btn" data-text="我想知道成绩单如何开具。">成绩单</button>
            <button class="quick-btn" data-text="我想了解打工规定。">打工规定</button>
            <button class="quick-btn" data-text="我想咨询出勤规定。">出勤规定</button>
          </div>
        </section>
      </aside>

      <section class="chat-section">
<div class="chat-header panel">
  <div>
    <h2 id="roomTitle">未进入房间</h2>
    <p id="roomSubtitle">请选择左侧房间进入咨询</p>
  </div>
  <div class="room-meta">
    <span class="meta-badge" id="roomIdBadge">Room ID: -</span>
    <span class="meta-badge" id="onlineCountBadge">老师 0 人 / 学生 0 人</span>
  </div>
</div>

        <div id="chatMessages" class="chat-messages panel"></div>

        <div class="chat-input panel">
          <textarea
            id="messageInput"
            placeholder="请输入消息…"
            rows="3"
          ></textarea>
          <div class="input-bottom">
            <div class="input-tips">
              <span>显示语言：<strong id="displayLanguageLabel">中文</strong></span>
            </div>
            <button id="sendBtn" class="primary-btn">发送消息</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
