
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>国际学生固定咨询室</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-left">
        <div class="logo">🌐</div>
        <div>
<h1 id="uiAppTitle">International Student Support Room</h1>
<p id="uiAppSubtitle">国际学生固定咨询室 · 외국인 유학생 고정 상담실</p>
        </div>
      </div>
<div class="topbar-right">
  <span class="status-dot"></span>
  <span id="roomStatusText">咨询室开放中</span>

  <select id="uiLanguageSelect" class="form-control ui-language-select">
    <option value="zh">中文界面</option>
    <option value="ko">한국어 UI</option>
    <option value="en">English UI</option>
  </select>
</div>
    </header>

<main class="main-layout">
      <div class="mobile-sidebar-toggle-wrap">
        <button id="mobileSidebarToggle" class="mobile-sidebar-toggle" type="button">
          房间与身份设置
        </button>
      </div>

      <aside id="sidebar" class="sidebar">
        <section class="panel">
          <div class="panel">
<h2 id="uiCreateRoomTitle">创建房间</h2>
<label id="uiRoomNameLabel" class="form-label">房间名称</label>
<input id="roomNameInput" class="form-control" type="text" placeholder="例如：AI专业助教咨询室" />

<label id="uiRoomCategoryLabel" class="form-label">房间分类</label>
<input id="roomCategoryInput" class="form-control" type="text" placeholder="例如：AI / 综合 / 酒店航空" />

<button id="createRoomBtn" class="primary-btn">创建房间</button>
</div>

<div class="panel">
  <h2 id="uiRoomListTitle">房间列表</h2>
  <div id="roomList"></div>
</div>
          <h2 id="uiEnterRoomTitle">进入咨询室</h2>

         <label id="uiRoleLabel" class="form-label">身份</label>
<select id="roleSelect" class="form-control">
  <option value="student">学生 Student</option>
  <option value="staff">老师 Staff</option>
</select>

<div id="studentNameBox">
  <label id="uiNameLabel" class="form-label">姓名 / 昵称</label>
  <input id="nameInput" class="form-control" type="text" placeholder="请输入姓名或昵称" />
</div>

<div id="staffLoginBox" style="display: none;">
  <label class="form-label" id="uiStaffUsernameLabel">老师账号</label>
  <input id="staffUsernameInput" class="form-control" type="text" placeholder="请输入老师账号" />

  <label class="form-label" id="uiStaffPasswordLabel">密码</label>
  <input id="staffPasswordInput" class="form-control" type="password" placeholder="请输入密码" />
</div>

<label id="uiTargetLangLabel" class="form-label">接收语言</label>
<select id="targetLanguage" class="form-control">
  <option value="zh">中文</option>
  <option value="ko">한국어</option>
  <option value="en">English</option>
  <option value="uz">Oʻzbekcha</option>
  <option value="mn">Монгол</option>
</select>

          <div class="current-user-box">
            <h3 id="uiCurrentUserTitle">当前身份</h3>
<p><strong id="uiCurrentRolePrefix">身份：</strong><span id="currentRole">未进入</span></p>
<p><strong id="uiCurrentNamePrefix">姓名：</strong><span id="currentName">未进入</span></p>
<p><strong id="uiCurrentSourceLangPrefix">发送语言：</strong><span id="currentSourceLang">-</span></p>
<p><strong id="uiCurrentTargetLangPrefix">接收语言：</strong><span id="currentTargetLang">-</span></p>
          </div>
        </section>

        <section class="panel">
          <h2 id="uiOnlineStaffTitle">当前在线老师</h2>
          <div id="onlineStaffList" class="staff-list"></div>
        </section>

<section class="panel" id="adminPanel" style="display: none;">
  <h2 id="uiAdminPanelTitle">老师账号管理</h2>

  <div class="admin-create-box" style="margin-bottom: 18px;">
    <h3>新建老师账号</h3>

    <label class="form-label" id="uiAdminNameLabel">老师姓名</label>
    <input id="adminStaffNameInput" class="form-control" type="text" placeholder="请输入老师姓名" />

    <label class="form-label" id="uiAdminUsernameLabel">老师账号</label>
    <input id="adminStaffUsernameInput" class="form-control" type="text" placeholder="请输入老师账号" />

    <label class="form-label" id="uiAdminPasswordLabel">老师密码</label>
    <input id="adminStaffPasswordInput" class="form-control" type="text" placeholder="请输入老师密码" />


<button id="saveStaffAccountBtn" class="primary-btn">创建老师账号</button>
  </div>

  <div class="admin-manage-box">
    <h3 id="uiAdminListTitle">已有老师账号管理</h3>
    <div id="staffAccountList"></div>
  </div>
</section>
      </aside>

      <section class="chat-section">
<div class="chat-header panel">
  <div>
    <h2 id="roomTitle">未进入房间</h2>
    <p id="roomSubtitle">请选择左侧房间进入咨询</p>
  </div>
  <div class="room-meta">
    <span class="meta-badge" id="roomIdBadge">Room ID: -</span>
    <span class="meta-badge" id="onlineCountBadge">老师 0 人 / 学生 0 人</span>
  </div>
</div>

        <div id="chatMessages" class="chat-messages panel"></div>

        <div class="chat-input panel">
          <textarea
            id="messageInput"
            placeholder="请输入消息…"
            rows="3"
          ></textarea>
          <div class="input-bottom">
            <div class="input-tips">
              <span>显示语言：<strong id="displayLanguageLabel">中文</strong></span>
            </div>
            <button id="sendBtn" class="primary-btn">发送消息</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
